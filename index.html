    <style>
        :root {
            --dark-teal: #194d4e;    
            --terracotta: #cc7e6e;   
            --bg-light: #ffffff;
            --text-main: #1a1a1a;
            --soft-bg: #f9f9f7;
            --whatsapp-green: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        header {
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            border-bottom: 1px solid #eee;
            height: 90px;
        }

        .logo-container img { height: 65px; width: auto; transition: transform 0.3s; }
        
        nav ul { display: flex; list-style: none; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark-teal); font-weight: 600; transition: 0.3s; }

        .nav-contact-btn {
            background-color: var(--dark-teal);
            color: white !important;
            padding: 12px 28px;
            border-radius: 50px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(25, 77, 78, 0.2);
        }

        .nav-contact-btn:hover {
            background-color: var(--terracotta);
            animation: shake 0.5s ease-in-out;
            box-shadow: 0 6px 15px rgba(204, 126, 110, 0.3);
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            50% { transform: rotate(-3deg); }
            75% { transform: rotate(2deg); }
            100% { transform: rotate(0deg); }
        }

        .filter-menu {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 12px;
            padding: 40px 5% 30px; background-color: var(--soft-bg);
        }

        .filter-btn {
            padding: 8px 22px; border: 1.5px solid var(--dark-teal);
            background: transparent; color: var(--dark-teal);
            cursor: pointer; font-weight: 600; transition: 0.3s; border-radius: 4px;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--terracotta); border-color: var(--terracotta); color: white;
        }

        .work-grid {
            columns: 3 300px; column-gap: 20px; padding: 0 5% 60px; background-color: var(--soft-bg);
        }

        .work-item {
            break-inside: avoid; margin-bottom: 20px; background-color: #fff;
            border-radius: 2px; cursor: pointer; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: inline-block; width: 100%;
        }

        .work-item img { width: 100%; height: auto; display: block; transition: 0.6s; }
        .work-item:hover img { transform: scale(1.03); }

        .contact-section { padding: 100px 5%; background-color: #ffffff; }
        .contact-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; text-align: right; }
        .contact-info h2 { font-size: 2.2rem; color: var(--dark-teal); margin-bottom: 20px; line-height: 1.2; }
        .info-item { margin-bottom: 25px; }
        .info-item h4 { color: var(--terracotta); font-size: 0.9rem; margin-bottom: 5px; }
        .info-item span { font-size: 1.2rem; font-weight: 500; color: var(--dark-teal); display: block; }
        
        .whatsapp-link {
            display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; padding: 10px 20px;
            background-color: var(--whatsapp-green); color: white; text-decoration: none; border-radius: 50px;
            font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-link:hover { transform: translateY(-3px); }
        .whatsapp-icon { width: 24px; height: 24px; fill: white; }

        .contact-form { background: var(--soft-bg); padding: 40px; border-radius: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dark-teal); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .submit-btn:hover { background: var(--terracotta); }

        #lightbox {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
        }
        #lightbox img { max-width: 85%; max-height: 85%; border: 3px solid white; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 50px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .nav-btn.disabled { opacity: 0.2; cursor: default; }
        .prev { right: 10px; } .next { left: 10px; }

        footer { padding: 40px; text-align: center; border-top: 1px solid #eee; background: var(--soft-bg); }

        @media (max-width: 900px) { .contact-container { grid-template-columns: 1fr; gap: 40px; } }
        @media (max-width: 600px) { .work-grid { columns: 2 150px; } }
    </style>

    <script>
        function filterGallery(category, event) {
            const items = document.querySelectorAll('.work-item');
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'inline-block';
                } else {
                    item.style.display = 'none';
                }
            });
            updateVisibleImages();
        }

        let currentIdx = 0;
        let visibleImages = [];
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const prevBtn = document.getElementById('lightbox-prev');
        const nextBtn = document.getElementById('lightbox-next');

        function updateVisibleImages() {
            visibleImages = Array.from(document.querySelectorAll('.work-item'))
                .filter(item => item.style.display !== 'none')
                .map(item => item.querySelector('img'));
        }

        function initGallery() {
            document.querySelectorAll('.work-item img').forEach((img) => {
                img.onclick = () => {
                    updateVisibleImages();
                    currentIdx = visibleImages.indexOf(img);
                    openLightbox();
                };
            });
        }

        function openLightbox() {
            if (currentIdx === -1) return;
            lightbox.style.display = 'flex';
            updateLightbox();
        }

        function closeLightbox() { lightbox.style.display = 'none'; }

        function updateLightbox() {
            if (visibleImages.length === 0) return;
            lightboxImg.src = visibleImages[currentIdx].src;
            if (currentIdx === 0) prevBtn.classList.add('disabled');
            else prevBtn.classList.remove('disabled');
            if (currentIdx === visibleImages.length - 1) nextBtn.classList.add('disabled');
            else nextBtn.classList.remove('disabled');
        }

        function changeImage(step) {
            if (visibleImages.length === 0) return;
            let newIdx = currentIdx + step;
            if (newIdx >= 0 && newIdx < visibleImages.length) {
                currentIdx = newIdx;
                updateLightbox();
            }
        }

        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === "ArrowLeft" && currentIdx > 0) changeImage(-1);
                if (e.key === "ArrowRight" && currentIdx < visibleImages.length - 1) changeImage(1);
                if (e.key === "Escape") closeLightbox();
            }
        });

        initGallery();
        updateVisibleImages();
    </script>
