<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtDesigner | Portfolio Studio</title>
    <style>
        :root {
            --dark-teal: #194d4e;    
            --terracotta: #cc7e6e;   
            --bg-light: #ffffff;
            --text-main: #1a1a1a;
            --soft-bg: #f9f9f7;
            --whatsapp-green: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        header {
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            border-bottom: 1px solid #eee;
            height: 90px;
        }

        .logo-container img { 
            height: 65px; 
            width: auto; 
            display: block;
        }
        
        nav ul { display: flex; list-style: none; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark-teal); font-weight: 600; transition: 0.3s; }
        nav a:hover { color: var(--terracotta); }

        .nav-contact-btn {
            background-color: var(--dark-teal);
            color: white !important;
            padding: 12px 28px;
            border-radius: 50px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .filter-menu {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 12px;
            padding: 40px 5% 30px; background-color: var(--soft-bg);
        }

        .filter-btn {
            padding: 8px 22px; border: 1.5px solid var(--dark-teal);
            background: transparent; color: var(--dark-teal);
            cursor: pointer; font-weight: 600; transition: 0.3s; border-radius: 4px;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--terracotta); border-color: var(--terracotta); color: white;
        }

        .work-grid {
            columns: 5 200px; column-gap: 15px; padding: 0 5% 60px; background-color: var(--soft-bg);
        }

        .work-item {
            break-inside: avoid; margin-bottom: 15px; background-color: #fff;
            border-radius: 2px; cursor: pointer; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: inline-block; width: 100%;
        }

        .work-item img { width: 100%; height: auto; display: block; transition: 0.6s; }
        .work-item:hover img { transform: scale(1.03); }

        .about-section { padding: 100px 5%; background-color: var(--soft-bg); text-align: center; border-top: 1px solid #eee; }
        .about-container { max-width: 900px; margin: 0 auto; }
        .about-section h2 { font-size: 2.5rem; color: var(--dark-teal); margin-bottom: 30px; position: relative; display: inline-block; }
        .about-section h2::after { content: ''; position: absolute; bottom: -10px; left: 20%; right: 20%; height: 3px; background-color: var(--terracotta); }
        
        .contact-section { padding: 100px 5%; background-color: #ffffff; }
        .contact-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; text-align: right; }
        .contact-info h2 { font-size: 2.2rem; color: var(--dark-teal); margin-bottom: 20px; }
        
        .whatsapp-link {
            display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; padding: 12px 24px;
            background-color: var(--whatsapp-green); color: white; text-decoration: none; border-radius: 50px;
            font-weight: bold; transition: 0.3s;
        }

        .contact-form { background: var(--soft-bg); padding: 40px; border-radius: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dark-teal); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        #form-message { display: none; margin-top: 15px; color: var(--dark-teal); font-weight: bold; text-align: center; }

        #lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        #lightbox img { max-width: 85%; max-height: 85%; border: 3px solid white; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; cursor: pointer; }

        footer { padding: 40px; text-align: center; border-top: 1px solid #eee; background: var(--soft-bg); }

        @media (max-width: 900px) { .contact-container { grid-template-columns: 1fr; gap: 40px; } }
        @media (max-width: 600px) { .work-grid { columns: 2 150px; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-container">
            <img src="images/logo.svg" alt="ArtDesigner">
        </a>
        <nav>
            <ul>
                <li><a href="#work">תיק עבודות</a></li>
                <li><a href="#about">אודות</a></li>
                <li><a href="#contact" class="nav-contact-btn">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <div class="filter-menu">
        <button class="filter-btn active" onclick="filterGallery('advertising', event)">פרסום</button>
        <button class="filter-btn" onclick="filterGallery('campaigns', event)">קמפיינים</button>
    </div>

    <section id="work" class="work-grid">
        <div class="work-item advertising"><img src="advertising/advertising_01.jpg" alt="1"></div>
        <div class="work-item advertising"><img src="advertising/advertising_02.jpg" alt="2"></div>
        <div class="work-item advertising"><img src="advertising/advertising_03.jpg" alt="3"></div>
        <div class="work-item advertising"><img src="advertising/advertising_04.jpg" alt="4"></div>
        <div class="work-item advertising"><img src="advertising/advertising_05.jpg" alt="5"></div>
        <div class="work-item advertising"><img src="advertising/advertising_06.jpg" alt="6"></div>
        <div class="work-item advertising"><img src="advertising/advertising_07.jpg" alt="7"></div>
        <div class="work-item advertising"><img src="advertising/advertising_08.jpg" alt="8"></div>

        <div class="work-item campaigns"><img src="campaigns/campaigns_01.jpg" alt="C1"></div>
        <div class="work-item campaigns"><img src="campaigns/campaigns_02.jpg" alt="C2"></div>
        </section>

    <section id="contact" class="contact-section">
        <div class="contact-container">
            <div class="contact-info">
                <h2>בואו נתחיל פרויקט חדש</h2>
                <div style="margin-top:20px;">
                    <p>052-7604121</p>
                    <p>ameirm16@gmail.com</p>
                    <a href="https://wa.me/972527604121" target="_blank" class="whatsapp-link">שלחו ווטסאפ</a>
                </div>
            </div>
            <div class="contact-form">
                <form id="contact-form">
                    <div class="form-group"><input type="text" name="name" placeholder="שם מלא" required></div>
                    <div class="form-group"><input type="email" name="email" placeholder="אימייל" required></div>
                    <div class="form-group"><textarea name="message" rows="5" placeholder="ספרו לי על הצורך שלכם..." required></textarea></div>
                    <button type="submit" class="submit-btn" id="submit-btn">שליחת הודעה</button>
                    <div id="form-message">ההודעה נשלחה בהצלחה!</div>
                </form>
            </div>
        </div>
    </section>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <footer><p>&copy; 2026 ArtDesigner | סטודיו לעיצוב</p></footer>

    <script>
        // כתובת הסקריפט שנתת לי
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyr9gKuTs3BjFdmSKTQHIVhvl7jeP1g5Bk0fvZmqT885lJtnl53c27P_bFFheSQOxPb/exec';
        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('form-message');

        // פונקציית שליחת הטופס
        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = 'שולח...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    btn.style.display = 'none';
                    msg.style.display = 'block';
                    form.reset();
                })
                .catch(error => {
                    btn.disabled = false;
                    btn.innerText = 'שליחת הודעה';
                    alert('חלה שגיאה בשליחה.');
                });
        });

        // פונקציות הגלריה
        function filterGallery(category, event) {
            const items = document.querySelectorAll('.work-item');
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            items.forEach(item => {
                item.style.display = (item.classList.contains(category)) ? 'inline-block' : 'none';
            });
        }

        function initGallery() {
            document.querySelectorAll('.work-item img').forEach((img) => {
                img.onclick = () => {
                    document.getElementById('lightbox').style.display = 'flex';
                    document.getElementById('lightbox-img').src = img.src;
                };
            });
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        window.onload = () => {
            filterGallery('advertising');
            initGallery();
        };
    </script>
</body>
</html>
