<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtDesigner | Studio</title>
    <style>
        :root { 
            --dark-teal: #194d4e; 
            --terracotta: #cc7e6e; 
            --soft-bg: #f4f4f2; /* רקע ימני נעים לעין */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: white; 
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* צד ימין - תוכן נקי */
        .content-side {
            width: 40%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--soft-bg);
            z-index: 10;
            text-align: center;
        }

        .logo-area { margin-bottom: 40px; }
        .logo-area img { height: 100px; width: auto; } /* לוגו גדול ללא קפסולה */

        h1 { font-size: 2.2rem; color: var(--dark-teal); margin-bottom: 35px; font-weight: 300; }

        .gallery-nav { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .main-btn {
            padding: 12px 35px; /* קפסולות קצרות יותר */
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--dark-teal);
            border: 1.5px solid var(--dark-teal);
            border-radius: 50px;
            transition: 0.3s;
            min-width: 220px;
        }

        .main-btn:hover {
            background: var(--dark-teal);
            color: white;
        }

        /* צד שמאל - מוזאיקה הדוקה */
        .grid-side {
            width: 60%;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* ריבועים קטנים יותר */
            grid-template-rows: repeat(auto-fill, 1fr);
            background: #eee;
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background-size: cover;
            background-position: center;
            border: 1.5px solid var(--dark-teal); /* קו חיצוני ירוק */
            transition: opacity 0.8s ease;
        }

        /* קפסולה צפה תחתונה עם אפקט מילוי */
        .floating-footer {
            position: absolute;
            bottom: 30px;
            background: white;
            border-radius: 100px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .floating-footer::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 100%;
            background: var(--terracotta);
            transition: width 0.6s ease;
            z-index: 0;
        }

        .floating-footer:hover::before { width: 100%; }

        .footer-inner {
            display: flex;
            gap: 25px;
            padding: 10px 30px;
            position: relative;
            z-index: 1;
        }

        .floating-footer a {
            text-decoration: none;
            color: var(--dark-teal);
            font-weight: 700;
            font-size: 0.95rem;
            transition: color 0.4s;
        }

        .floating-footer:hover a { color: white; }

        @media (max-width: 1024px) {
            body { flex-direction: column-reverse; overflow-y: auto; }
            .content-side, .grid-side { width: 100%; height: auto; }
            .grid-side { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="content-side">
        <div class="logo-area">
            <img src="images/logo.svg" alt="ArtDesigner">
        </div>
        <h1>השראה. עיצוב. אמנות.</h1>
        
        <div class="gallery-nav">
            <a href="portfolio.html?cat=advertising" class="main-btn">תיק עבודות: פרסום</a>
            <a href="portfolio.html?cat=campaigns" class="main-btn">תיק עבודות: קמפיינים</a>
        </div>

        <nav class="floating-footer">
            <div class="footer-inner">
                <a href="about.html">אודות</a>
                <a href="about.html#contact">צור קשר</a>
            </div>
        </nav>
    </div>

    <div class="grid-side" id="mosaicGrid">
        </div>

    <script>
        const images = [
            'advertising/advertising_01.jpg', 'advertising/advertising_02.jpg',
            'advertising/advertising_03.jpg', 'advertising/advertising_04.jpg',
            'campaigns/campaigns_01.jpg', 'campaigns/campaigns_02.jpg',
            'campaigns/campaigns_03.jpg', 'campaigns/campaigns_04.jpg',
            'torani-chaisidi/torani-chaisidi_01.jpg', 'torani-chaisidi/torani-chaisidi_02.jpg'
        ];

        const grid = document.getElementById('mosaicGrid');
        const totalItems = 36; // ממלא את כל השטח בריבועים קטנים

        for (let i = 0; i < totalItems; i++) {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.style.backgroundImage = `url('${images[Math.floor(Math.random() * images.length)]}')`;
            grid.appendChild(item);
        }

        function updateRandomTile() {
            const items = document.querySelectorAll('.grid-item');
            const randomItem = items[Math.floor(Math.random() * items.length)];
            const newImg = images[Math.floor(Math.random() * images.length)];
            
            randomItem.style.opacity = 0.3;
            setTimeout(() => {
                randomItem.style.backgroundImage = `url('${newImg}')`;
                randomItem.style.opacity = 1;
            }, 800);
        }

        setInterval(updateRandomTile, 2000); // קצב החלפה סביר
    </script>
</body>
</html>
